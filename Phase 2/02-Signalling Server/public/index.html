<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p2p signaling</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div id="app">

    <div id="lobby">
      <center><h1>whoosh<span class="dot">.</span></h1>
      <p class="sub">peer-to-peer, no server in the middle</p>
      <div id="actions"> </center>
        <button id="createBtn">create room</button>
        <div class="divider">or</div>
        <div id="joinGroup">
          <input id="roomInput" placeholder="enter room code" autocomplete="off" />
          <button id="joinBtn">join</button>
        </div>
      </div>
    </div>

    <div id="room" class="hidden">
      <!-- <h1>whoosh<span class="dot">.</span></h1> -->
      <div id="status">
        <p id="roomCode"></p>
        <p id="statusMsg"></p>
      </div>
    </div>

    <!-- chat -->
    <div class="chat-panel">
      <div class="chatbox" id="chat">
        <p class="empty">no messages yet — connect first</p>
      </div>
      <div class="input-row">
        <input type="text" id="msgInput" placeholder="type a message..." autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
    </div>

  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="index.js"></script>
</body>
</html>
